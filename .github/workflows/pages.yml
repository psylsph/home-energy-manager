name: Deploy GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/screenshots/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy latest screenshots into docs
        run: |
          mkdir -p docs/screenshots
          cp .github/screenshots/*.png docs/screenshots/

      - name: Inject release download count
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          total=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            | jq '[.[].assets[].download_count] | add // 0')
          formatted=$(python3 -c 'import sys; print(f"{int(sys.argv[1]):,}")' "$total")
          python3 -c "from pathlib import Path; p = Path('docs/index.html'); p.write_text(p.read_text().replace('__DOWNLOAD_COUNT__', '$formatted'))"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
