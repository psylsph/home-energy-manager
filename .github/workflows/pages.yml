name: Deploy GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/screenshots/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy latest screenshots into docs
        run: |
          mkdir -p docs/screenshots
          cp .github/screenshots/*.png docs/screenshots/

      - name: Inject release download count
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 << 'PY'
          import json, os, urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          total = 0
          page = 1
          while True:
              url = f"https://api.github.com/repos/{repo}/releases?per_page=100&page={page}"
              req = urllib.request.Request(url, headers=headers)
              data = json.loads(urllib.request.urlopen(req).read())
              if not data:
                  break
              total += sum(
                  asset["download_count"]
                  for release in data
                  for asset in release.get("assets", [])
              )
              page += 1

          formatted = f"{total:,}"
          from pathlib import Path
          p = Path("docs/index.html")
          p.write_text(p.read_text().replace("__DOWNLOAD_COUNT__", formatted))
          print(f"Total downloads: {formatted}")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
