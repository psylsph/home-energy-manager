name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    env:
      CARGO_NET_RETRY: "10"
      RUSTUP_MAX_RETRIES: "10"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.platform }}
          cache-on-failure: true

      - name: Install frontend dependencies
        uses: ./.github/actions/setup-frontend

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            rpm

      - name: Install Tauri CLI
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall --no-confirm tauri-cli

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          TAURI_BUNDLER_DMG_IGNORE_CI: false
        run: cargo tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        run: cargo tauri build --target ${{ matrix.target }} --bundles msi

      - name: Build Tauri app (Linux)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-24.04-arm'
        run: cargo tauri build --target ${{ matrix.target }} --bundles deb,rpm

      - name: Customize macOS DMG
        if: matrix.platform == 'macos-latest'
        run: |
          set -euo pipefail

          DMG_PATH=$(find "$GITHUB_WORKSPACE/src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -maxdepth 1 -name '*.dmg' -print -quit)
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG found"
            exit 1
          fi
          echo "Customizing DMG: $DMG_PATH"

          MNT=$(mktemp -d)
          STAGE=$(mktemp -d)
          NEW_DMG="$RUNNER_TEMP/customized-${{ matrix.target }}.dmg"

          cleanup() {
            hdiutil detach "$MNT" -quiet >/dev/null 2>&1 || hdiutil detach "$MNT" -force >/dev/null 2>&1 || true
            rm -rf "$MNT" "$STAGE" "$NEW_DMG"
          }
          trap cleanup EXIT

          # Mount original DMG read-only and copy contents to a writable staging dir.
          hdiutil attach "$DMG_PATH" -mountpoint "$MNT" -nobrowse -readonly -quiet
          ditto "$MNT" "$STAGE"
          hdiutil detach "$MNT" -quiet >/dev/null 2>&1 || hdiutil detach "$MNT" -force

          # Give macOS a moment to fully release the mounted image before
          # creating a replacement.
          sleep 2

          # Keep the /Applications symlink — standard macOS DMG behaviour.
          # The app is ad-hoc signed and macOS 26.5 will prompt the user to
          # approve it via System Settings → Privacy & Security → "Open Anyway"
          # on first launch. This one-time Gatekeeper approval is the normal
          # macOS workflow for unsigned apps.

          # Copy in the launcher script that auto-handles quarantine + zombie cleanup.
          if [ -f "$GITHUB_WORKSPACE/launch.command" ]; then
            cp "$GITHUB_WORKSPACE/launch.command" "$STAGE/Launch.command"
            chmod +x "$STAGE/Launch.command"
          fi

          # Add concise install instructions.
          cat > "$STAGE/README.txt" << 'EOF'
          Home Energy Manager — macOS Install Notes
          ======================================

          1. Drag Home Energy Manager.app into the Applications folder
          2. Double-click Launch.command to start the app (auto-handles Gatekeeper)
             Or open Terminal and run: xattr -d com.apple.quarantine /Applications/Home\ Energy\ Manager.app
             Or right-click the app → Open → Open

          If Gatekeeper still blocks it on first launch:
          System Settings → Privacy & Security → click "Open Anyway"

          For Intel Macs, use the x86_64 (Intel) release.
          EOF

          # Rebuild DMG from staging directory.
          for attempt in 1 2 3 4 5; do
            if hdiutil create -ov -srcfolder "$STAGE" -format UDZO \
              -volname "Home Energy Manager" -fs HFS+ "$NEW_DMG"; then
              break
            fi
            echo "hdiutil create failed on attempt $attempt; retrying..."
            sleep 3
          done

          if [ ! -f "$NEW_DMG" ]; then
            echo "Failed to create customized DMG"
            exit 1
          fi

          mv "$NEW_DMG" "$DMG_PATH"
          echo "DMG customized successfully"

      - name: Prepare release assets
        env:
          TARGET: ${{ matrix.target }}
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ github.ref_name }}
        shell: bash
        run: |
          if command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN=python3
          else
            PYTHON_BIN=python
          fi

          "$PYTHON_BIN" << 'PY'
          import os
          import shutil
          from pathlib import Path

          target = os.environ["TARGET"]
          platform = os.environ["PLATFORM"]
          version = os.environ["VERSION"]
          product = "Home-Energy-Manager"

          bundle_dir = Path("src-tauri") / "target" / target / "release" / "bundle"
          out_dir = Path("release-assets")
          out_dir.mkdir(exist_ok=True)

          def arch_label() -> str:
              if "aarch64" in target:
                  return "ARM64"
              if "x86_64" in target:
                  return "x86_64"
              return target

          def friendly_name(path: Path) -> str:
              ext = path.suffix
              ext_lower = ext.lower()
              arch = arch_label()

              if ext_lower == ".dmg":
                  if "aarch64" in target:
                      return f"macOS-Apple-Silicon-{product}-{version}.dmg"
                  return f"macOS-Intel-{product}-{version}.dmg"
              if ext_lower == ".msi":
                  return f"Windows-MSI-{product}-{version}.msi"

              if ext_lower == ".deb":
                  return f"Linux-Debian-{arch}-{product}-{version}.deb"
              if ext_lower == ".rpm":
                  return f"Linux-RPM-{arch}-{product}-{version}.rpm"
              return f"{platform}-{arch}-{product}-{version}{ext}"

          copied = []
          for path in bundle_dir.rglob("*"):
              if not path.is_file():
                  continue
              if path.suffix.lower() not in {".dmg", ".deb", ".rpm", ".msi", ".exe"}:
                  continue
              dest = out_dir / friendly_name(path)
              if " " in dest.name:
                  raise SystemExit(f"Release asset filename must not contain spaces: {dest.name}")
              shutil.copy2(path, dest)
              copied.append(dest)
              print(f"Prepared release asset: {dest}")

          if not copied:
              raise SystemExit(f"No release assets found under {bundle_dir}")
          PY

      - name: Verify release assets
        env:
          TARGET: ${{ matrix.target }}
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          expected_version="${VERSION#v}"

          if [ "$PLATFORM" = "macos-latest" ]; then
            dmg=$(find release-assets -maxdepth 1 -name '*.dmg' -print -quit)
            if [ -z "$dmg" ]; then
              echo "No macOS DMG prepared"
              exit 1
            fi

            mnt=$(mktemp -d)
            cleanup() {
              hdiutil detach "$mnt" -quiet >/dev/null 2>&1 || hdiutil detach "$mnt" -force >/dev/null 2>&1 || true
              rm -rf "$mnt"
            }
            trap cleanup EXIT

            hdiutil attach "$dmg" -mountpoint "$mnt" -nobrowse -readonly -quiet
            app=$(find "$mnt" -maxdepth 2 -name '*.app' -print -quit)
            if [ -z "$app" ]; then
              echo "No .app found inside DMG"
              exit 1
            fi

            plist_version=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")
            if [ "$plist_version" != "$expected_version" ]; then
              echo "DMG app version mismatch: expected $expected_version, got $plist_version"
              exit 1
            fi

            if ! grep -R "$expected_version" "$app/Contents/Resources/dist" >/dev/null; then
              echo "Bundled frontend does not contain expected version $expected_version"
              exit 1
            fi

            # This marker comes from the responsive bottom-nav fix and catches
            # accidental packaging of the older frontend bundle.
            if ! grep -R "min-w-0 flex-1" "$app/Contents/Resources/dist" >/dev/null; then
              echo "Bundled frontend is missing the responsive bottom-nav fix"
              exit 1
            fi

            echo "Verified macOS DMG contains app/frontend version $expected_version"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Home Energy Manager ${{ github.ref_name }}"
          body: |
            ## Which file should I download?

            | File prefix | Platform |
            |---|---|
            | `macOS-Apple-Silicon-...dmg` | **macOS** — Apple Silicon (M1/M2/M3/M4) |
            | `macOS-Intel-...dmg` | **macOS** — Intel |
            | `Windows-MSI-...msi` | **Windows** — MSI installer |
            | `Linux-Debian-x86_64-...deb` | **Linux** — Debian/Ubuntu (x86_64) |
            | `Linux-Debian-ARM64-...deb` | **Linux** — Debian/Ubuntu (ARM64, e.g. Raspberry Pi) |
            | `Linux-RPM-x86_64-...rpm` | **Linux** — RHEL/Fedora/openSUSE (x86_64) |
            | `Linux-RPM-ARM64-...rpm` | **Linux** — RHEL/Fedora/openSUSE (ARM64) |
            | `Android-Chromebook-...apk` | **Chromebook** — Android APK (ARM64 & x86_64) |

            > **Windows security notice**: Windows SmartScreen may warn that the MSI is from an unknown publisher because the app is not code-signed. The installer is scanned clean by VirusTotal. If your antivirus flags it as malware, please report a security vulnerability at <https://github.com/psylsph/home-energy-manager/issues>.

            > **macOS users**: Drag the app to your Applications folder. On first launch Gatekeeper may block it — open System Settings → Privacy & Security → click "Open Anyway". Or right-click the app → Open. See README.txt inside the DMG for details.

            ---

            See [CHANGELOG.md](https://github.com/psylsph/home-energy-manager/blob/master/CHANGELOG.md) for details.
          draft: false
          prerelease: false
          files: release-assets/*

  build-android:
    name: Android APK
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    env:
      CARGO_NET_RETRY: "10"
      RUSTUP_MAX_RETRIES: "10"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: android
          cache-on-failure: true

      - name: Install frontend dependencies
        uses: ./.github/actions/setup-frontend

      - name: Build frontend
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973" > /dev/null 2>&1
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Tauri CLI
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall --no-confirm tauri-cli

      - name: Initialize Android project
        run: cargo tauri android init --ci

      - name: Build APK
        run: cargo tauri android build --apk --ci

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          # Tauri v2 may produce app-universal-release-unsigned.apk or
          # app-universal-release.apk depending on the version.
          # Use find to discover whatever APK was produced.
          apk_dir="src-tauri/gen/android/app/build/outputs/apk"
          found=false

          for apk in "$apk_dir"/universal/release/app-universal-release*.apk; do
            if [ -f "$apk" ]; then
              cp "$apk" "release-assets/Android-Chromebook-ARM64-Home-Energy-Manager-${{ github.ref_name }}.apk"
              echo "Copied universal APK: $apk"
              found=true
            fi
          done

          # Also look for per-abi APKs (arm64-v8a, x86_64)
          for abi in arm64-v8a x86_64; do
            for apk in "$apk_dir/$abi/release/app-$abi-release"*.apk; do
              if [ -f "$apk" ]; then
                label="$abi"
                case "$abi" in
                  arm64-v8a) label="ARM64" ;;
                  x86_64)   label="x86_64" ;;
                esac
                cp "$apk" "release-assets/Android-Chromebook-$label-Home-Energy-Manager-${{ github.ref_name }}.apk"
                echo "Copied per-abi APK ($abi): $apk"
                found=true
              fi
            done
          done

          if [ "$found" = false ]; then
            echo "ERROR: No APK found anywhere under $apk_dir"
            ls -laR "$apk_dir" 2>/dev/null || echo "APK directory does not exist"
            exit 1
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
