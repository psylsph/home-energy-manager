name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        uses: ./.github/actions/setup-frontend

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            rpm

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (macOS)
        if: matrix.platform == 'macos-latest'
        run: cargo tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        run: cargo tauri build --target ${{ matrix.target }} --bundles nsis,msi

      - name: Build Tauri app (Linux)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-24.04-arm'
        run: cargo tauri build --target ${{ matrix.target }} --bundles deb,rpm,appimage

      - name: Customize macOS DMG
        if: matrix.platform == 'macos-latest'
        run: |
          DMG_PATH=$(ls "$GITHUB_WORKSPACE/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/"*.dmg)
          echo "Customizing DMG: $DMG_PATH"
          # Mount original DMG (read-only) and copy contents to a writable staging dir
          MNT=$(mktemp -d)
          STAGE=$(mktemp -d)
          hdiutil attach "$DMG_PATH" -mountpoint "$MNT" -nobrowse -quiet
          cp -R "$MNT/"* "$STAGE/"
          hdiutil detach "$MNT" -quiet
          # Remove misleading /Applications symlink — macOS 26.5 blocks unsigned
          # apps in /Applications, so the symlink invites users to break the app.
          rm -f "$STAGE/Applications"
          # Add install instructions
          cat > "$STAGE/README.txt" << 'EOF'
          Home Energy Manager — macOS Install Notes
          ======================================

          IMPORTANT: Do NOT drag this app to /Applications.
          macOS 26.5 (Sequoia) blocks unsigned apps in /Applications.

          Instead, drag GivEnergy-Local.app to your Desktop or Home folder.
          Then double-click to run.

          On first launch you may see a Gatekeeper warning:
          1. Open System Settings → Privacy & Security
          2. Click "Open Anyway" next to the security warning
          3. Or right-click the app → Open → Open

          For Apple Silicon (M1/M2/M3/M4) Macs, use the aarch64 release.
          For Intel Macs, use the x86_64 release.
          EOF
          # Rebuild DMG from staging directory
          hdiutil create -ov -srcfolder "$STAGE" -format UDZO \
            -volname "Home Energy Manager" -fs HFS+ "${DMG_PATH}.new"
          mv "${DMG_PATH}.new.dmg" "$DMG_PATH"
          echo "DMG customized successfully"

      - name: Prepare release assets
        env:
          TARGET: ${{ matrix.target }}
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ github.ref_name }}
        shell: bash
        run: |
          if command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN=python3
          else
            PYTHON_BIN=python
          fi

          "$PYTHON_BIN" << 'PY'
          import os
          import shutil
          from pathlib import Path

          target = os.environ["TARGET"]
          platform = os.environ["PLATFORM"]
          version = os.environ["VERSION"]
          product = "Home-Energy-Manager"

          bundle_dir = Path("src-tauri") / "target" / target / "release" / "bundle"
          out_dir = Path("release-assets")
          out_dir.mkdir(exist_ok=True)

          def arch_label() -> str:
              if "aarch64" in target:
                  return "ARM64"
              if "x86_64" in target:
                  return "x86_64"
              return target

          def friendly_name(path: Path) -> str:
              ext = path.suffix
              ext_lower = ext.lower()
              arch = arch_label()

              if ext_lower == ".dmg":
                  if "aarch64" in target:
                      return f"macOS-Apple-Silicon-{product}-{version}.dmg"
                  return f"macOS-Intel-{product}-{version}.dmg"
              if ext_lower == ".exe":
                  return f"Windows-Installer-{product}-{version}.exe"
              if ext_lower == ".msi":
                  return f"Windows-MSI-{product}-{version}.msi"
              if ext_lower == ".deb":
                  return f"Linux-Debian-{arch}-{product}-{version}.deb"
              if ext_lower == ".rpm":
                  return f"Linux-RPM-{arch}-{product}-{version}.rpm"
              if ext_lower == ".appimage":
                  return f"Linux-AppImage-{arch}-{product}-{version}.AppImage"
              return f"{platform}-{arch}-{product}-{version}{ext}"

          copied = []
          for path in bundle_dir.rglob("*"):
              if not path.is_file():
                  continue
              if path.suffix.lower() not in {".dmg", ".deb", ".rpm", ".msi", ".exe", ".appimage"}:
                  continue
              dest = out_dir / friendly_name(path)
              shutil.copy2(path, dest)
              copied.append(dest)
              print(f"Prepared release asset: {dest}")

          if not copied:
              raise SystemExit(f"No release assets found under {bundle_dir}")
          PY

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Home Energy Manager ${{ github.ref_name }}"
          body: |
            ## Which file should I download?

            | File prefix | Platform |
            |---|---|
            | `macOS-Apple-Silicon-...dmg` | **macOS** — Apple Silicon (M1/M2/M3/M4) |
            | `macOS-Intel-...dmg` | **macOS** — Intel |
            | `Windows-Installer-...exe` | **Windows** — standard installer |
            | `Windows-MSI-...msi` | **Windows** — MSI package |
            | `Linux-Debian-...deb` | **Linux** — Debian/Ubuntu |
            | `Linux-RPM-...rpm` | **Linux** — RHEL/Fedora/openSUSE, not macOS |
            | `Linux-AppImage-...AppImage` | **Linux** — portable AppImage |

            > **macOS users**: Do NOT drag the app to `/Applications`. macOS 26.5+ blocks unsigned apps there. Drag it to your **Desktop** or **Home folder** instead. See the README.txt inside the DMG for details.

            ---

            See [CHANGELOG.md](https://github.com/psylsph/givenergy-local/blob/master/CHANGELOG.md) for details.
          draft: false
          prerelease: false
          files: release-assets/*
