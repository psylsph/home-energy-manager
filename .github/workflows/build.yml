name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        uses: ./.github/actions/setup-frontend

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "GivEnergy Local ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/psylsgh/givenergy-local/blob/master/CHANGELOG.md) for details."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      # Post-process DMG: remove the /Applications symlink (misleading on macOS 26.5+)
      # and add a README telling users to keep the app on Desktop
      - name: Customize DMG (macOS only)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          DMG_PATH=$(ls "${{ github.workspace }}/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/"*.dmg 2>/dev/null || echo "")
          if [ -z "$DMG_PATH" ]; then echo "No DMG found"; exit 0; fi
          echo "Customizing: $DMG_PATH"
          MNT=$(mktemp -d)
          hdiutil attach "$DMG_PATH" -mountpoint "$MNT" -nobrowse
          rm -f "$MNT/Applications"
          printf '%s\n' \
            'GivEnergy Local' \
            '===============' \
            '' \
            'macOS 26.5+ blocks unsigned apps installed in /Applications.' \
            'DO NOT drag the .app to /Applications - it will not run.' \
            '' \
            'INSTEAD: drag the .app to your Desktop and launch from there.' \
            '' \
            'To launch: double-click the app, or run from Terminal:' \
            '  ~/Desktop/GivEnergy-Local.app/Contents/MacOS/givenergy-local' \
            '' \
            'FAQ: https://github.com/psylsgh/givenergy-local' \
            > "$MNT/README.txt"
          sleep 2
          hdiutil detach "$MNT"
          hdiutil create -ov -srcfolder "$MNT" -format UDZO -volname "GivEnergy-Local" -fs HFS+ "${DMG_PATH}.tmp"
          mv "${DMG_PATH}.tmp" "$DMG_PATH"
          rm -rf "$MNT"
          echo "DMG customized OK"
