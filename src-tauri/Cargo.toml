[package]
name = "givenergy-local"
version = "0.4.0"
description = "GivEnergy inverter local monitoring and control"
authors = ["Stuart Harding"]
license = "MIT"
repository = "https://github.com/psylsph/givenergy-local"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.2", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.11.2", features = [] }
tauri-plugin-log = "2"

# Async runtime
tokio = { version = "1", features = ["full"] }

# HTTP server
axum = { version = "0.8", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "fs"] }

# CRC for Modbus
crc = "3"

# Chrono for timestamps
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Tracing
tracing = "0.1"
tracing-subscriber = "0.3"

# Futures utilities (join_all for discovery)
futures-util = "0.3"

# Network interface detection
local-ip-address = "0.6"
